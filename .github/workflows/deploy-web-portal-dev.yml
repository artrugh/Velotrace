name: Deploy Web Portal Development to Vercel
on:
  push:
    branches-ignore: [main]
    paths:
      - "apps/web-portal/**"
      - ".github/workflows/deploy-web-portal-dev.yml"
      - "libs/api-contract/**"
      - "package.json"
      - "vercel.json"
  workflow_dispatch:

jobs:
  deploy-development:
    runs-on: ubuntu-latest
    environment: dev
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Check if Web Portal is Affected
        id: check_affected
        run: |
          # Run nx and store output. If nx fails, the script fails here (-e).
          AFFECTED_PROJECTS=$(npx -y nx show projects --affected --base=origin/main --head=HEAD)

          if echo "$AFFECTED_PROJECTS" | grep -q 'web-portal'; then
            echo "affected=true" >> $GITHUB_OUTPUT
          else
            echo "affected=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare API Contracts
        # if: steps.check_affected.outputs.affected == 'true'
        run: |
          cp -r libs apps/web-portal/
          npx nx run web-portal:generate:contracts

      - name: Run Tests
        # if: steps.check_affected.outputs.affected == 'true'
        run: npx nx run web-portal:test

      - name: Build Web Portal (Development)
        # if: steps.check_affected.outputs.affected == 'true'
        run: npx nx run web-portal:build --verbose

      - name: Deploy Development to Vercel
        # if: steps.check_affected.outputs.affected == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NITRO_OUTPUT_DIR: ${{ secrets.NITRO_OUTPUT_DIR }}
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=development --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
