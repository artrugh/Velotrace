name: Lint and Format Check
on:
  push:
    paths:
      - "apps/**"
      - ".github/workflows/lint.yml"
      - "package.json"
      - ".golangci.yml"
      - ".prettierignore"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Prettier (Minimal)
        run: npm install prettier

      - name: Lint Global Configs (Prettier)
        run: npx prettier --check "*.{json,yml,yaml,md}" ".github/workflows/*.yml"

      - name: Check Affected Projects
        id: affected
        run: |
          echo "web_portal=$(npx -y nx show projects --affected --target=lint --base=HEAD~1 --head=HEAD | grep -q 'web-portal' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "identity_api=$(npx -y nx show projects --affected --target=lint --base=HEAD~1 --head=HEAD | grep -q 'identity-api' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Install Frontend Deps
        if: steps.affected.outputs.web_portal == 'true'
        run: npm install

      - name: Setup Go and Install Linter
        if: steps.affected.outputs.identity_api == 'true'
        run: |
          # Manual setup of Go environment to keep it fast
          sudo apt-get update && sudo apt-get install -y golang-1.23
          export PATH=$PATH:/usr/lib/go-1.23/bin
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5

      - name: Nx Affected Lint
        run: |
          npx -y nx affected --target=lint --base=HEAD~1 --head=HEAD
