root = "."
tmp_dir = "tmp"

[build]
pre_cmd = [ "go mod download", "swag init -g ./cmd/main.go -d . --output /libs/api-contract/identity-api --outputTypes yaml"]
cmd = "go build -o ./tmp/main ./cmd/main.go"
bin = "./tmp/main"
full_bin = "./tmp/main"
include_ext = ["go", "tpl", "tmpl", "html", "js", "css", "scss", "toml"]
exclude_dir = ["bin", "tmp", "vendor", "certs", "static", "uploads"]
include_dir = []
include_file = []
exclude_file = []
exclude_regex = ["_test\\.go", "mock_.*\\.go", "gomock_.*\\.go"]
exclude_unchanged = true
follow_symlink = true
log = "air.log"
poll = true
poll_interval = 500
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = 500 # nanosecond
rerun = false
rerun_delay = 500

[log]
time = false
main_only = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Delete tmp directory on exit
clean_on_exit = true

[screen]
clear_on_rebuild = true
keep_scroll = true
