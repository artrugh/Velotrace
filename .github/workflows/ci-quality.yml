name: Quality and Contract Validation
on:
  push:
    paths:
      - "apps/**"
      - ".github/workflows/ci-quality.yml"
      - "package.json"
      - ".golangci.yml"
      - ".prettierignore"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Global Lint (Prettier)
        run: pnpm run lint

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            apps/identity-api/go.sum
            apps/bikes-api/go.sum

      - name: Verify Identity API Contract
        run: |
          pnpm exec nx run identity-api:generate-contracts --verbose
          if ! git diff --exit-code libs/api-contract/identity-api/swagger.yaml; then
            echo "❌ ERROR: Identity API contract is out of date!"
            exit 1
          fi
          if ! git diff --exit-code libs/api-contract/bikes-api/swagger.yaml; then
            echo "❌ ERROR: Bikes API contract is out of date!"
            exit 1
          fi

      - name: Nx Affected Lint
        run: pnpm exec nx affected --target=lint --base=HEAD~1 --head=HEAD --parallel=1
