basePath: /
definitions:
  domain.Bike:
    properties:
      created_at:
        description: Timestamp
        type: string
      current_owner_id:
        description: FK to Users (Not Null)
        type: string
      description:
        description: Optional text description
        type: string
      id:
        description: Primary Key (UUID)
        type: string
      images:
        description: Related images (Max 20)
        items:
          $ref: '#/definitions/domain.BikeImage'
        maxItems: 20
        type: array
      location_city:
        description: City where the bike is located
        type: string
      make_model:
        description: Combined Make and Model (Required)
        type: string
      price:
        description: Decimal price (Mapped to float64)
        type: number
      serial_number:
        description: Unique Serial Number (Required)
        type: string
      status:
        allOf:
        - $ref: '#/definitions/domain.BikeStatus'
        description: Enum (registered, for_sale, stolen, transferred)
      updated_at:
        description: Timestamp
        type: string
      year:
        description: Manufacturing Year
        type: integer
    required:
    - make_model
    - serial_number
    type: object
  domain.BikeImage:
    properties:
      bike_id:
        description: FK to Bikes
        type: string
      created_at:
        description: Timestamp
        type: string
      id:
        description: Primary Key
        type: string
      is_primary:
        description: 'Boolean flag (Default: false)'
        type: boolean
      url:
        description: Publicly accessible URL (Calculated)
        type: string
    type: object
  domain.BikeStatus:
    enum:
    - registered
    - for_sale
    - stolen
    - transferred
    type: string
    x-enum-varnames:
    - StatusRegistered
    - StatusForSale
    - StatusStolen
    - StatusTransferred
  handler.BikeListResponse:
    properties:
      bikes:
        items:
          $ref: '#/definitions/domain.Bike'
        maxItems: 1000
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  handler.ConfirmUploadRequest:
    properties:
      object_key:
        type: string
    required:
    - object_key
    type: object
  handler.RegisterBikeRequest:
    properties:
      description:
        type: string
      location_city:
        type: string
      make_model:
        type: string
      price:
        type: number
      serial_number:
        type: string
      year:
        type: integer
    required:
    - make_model
    - serial_number
    type: object
  handler.UploadURLRequest:
    properties:
      filename:
        type: string
    required:
    - filename
    type: object
  handler.UploadURLResponse:
    properties:
      object_key:
        type: string
      upload_url:
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: High-trust Bicycle Registry & Marketplace API.
  title: VeloTrace Bikes API
  version: "1.0"
paths:
  /admin/bikes:
    get:
      description: Returns every bike in the system. Strictly for users with admin
        role.
      parameters:
      - default: 1000
        description: Maximum number of bikes to return (max 1000)
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of bikes to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.BikeListResponse'
        "400":
          description: invalid limit or offset
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: List all bikes (Admin)
      tags:
      - admin
  /bikes:
    get:
      description: Returns a list of bikes with status 'for_sale'. Sensitive fields
        are redacted.
      parameters:
      - default: 1000
        description: Maximum number of bikes to return (max 1000)
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of bikes to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.BikeListResponse'
        "400":
          description: invalid limit or offset
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List public bikes for sale
      tags:
      - bikes
    post:
      consumes:
      - application/json
      description: Creates a bike entry and an ownership record in a single transaction
      parameters:
      - description: Bike registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterBikeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Bike'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: serial number already registered
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Register a new bike
      tags:
      - bikes
  /bikes/{id}:
    get:
      description: 'Returns bike details. Hybrid logic: Public fields if for_sale,
        full fields if owner/admin, 404 otherwise.'
      parameters:
      - description: Bike ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Bike'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get bike by ID
      tags:
      - bikes
  /bikes/{id}/images/confirm:
    post:
      consumes:
      - application/json
      description: Creates a bike_image record. Sets as primary if it's the first
        image.
      parameters:
      - description: Bike ID
        in: path
        name: id
        required: true
        type: string
      - description: Confirm upload request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ConfirmUploadRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: bike not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Confirm image upload
      tags:
      - images
  /bikes/{id}/upload-url:
    post:
      consumes:
      - application/json
      description: Generates a unique object key and a presigned URL valid for 15
        minutes
      parameters:
      - description: Bike ID
        in: path
        name: id
        required: true
        type: string
      - description: Upload request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UploadURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UploadURLResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: Get presigned upload URL
      tags:
      - images
  /my/bikes:
    get:
      description: Returns all bikes owned by the authenticated user with full metadata.
      parameters:
      - default: 1000
        description: Maximum number of bikes to return (max 1000)
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of bikes to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.BikeListResponse'
        "400":
          description: invalid limit or offset
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - Bearer: []
      summary: List my bikes
      tags:
      - bikes
securityDefinitions:
  Bearer:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
