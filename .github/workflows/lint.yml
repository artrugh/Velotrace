name: Lint and Format Check
on:
  push:
    paths:
      - "apps/**"
      - ".github/workflows/lint.yml"
      - "package.json"
      - ".golangci.yml"
      - ".prettierignore"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies (Minimal)
        run: npm install

      - name: Global Lint (Prettier)
        run: npx prettier --check "*.{json,yml,yaml,md}" ".github/workflows/*.yml"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run golangci-lint
        # We only run this if identity-api is affected
        run: |
          if npx -y nx show projects --affected --base=HEAD~1 --head=HEAD | grep -q 'identity-api'; then
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.5
            $(go env GOPATH)/bin/golangci-lint run apps/identity-api/... -v
          else
            echo "Identity API not affected, skipping Go lint."
          fi

      - name: Run Web Portal Lint
        run: |
          if npx -y nx show projects --affected --base=HEAD~1 --head=HEAD | grep -q 'web-portal'; then
            npx nx run web-portal:lint
          else
            echo "Web Portal not affected, skipping Nuxt lint."
          fi
