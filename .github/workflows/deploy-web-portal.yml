name: Deploy Web Portal to Vercel
on:
  push:
    branches: [main]
    paths:
      - 'apps/web-portal/**'
      - '.github/workflows/deploy-web-portal.yml'
      - 'package.json'
      - 'vercel.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check if Web Portal is Affected
        id: check_affected
        run: |
          # Use nx show projects --affected to determine if web-portal needs a build
          if npx nx show projects --affected --base=HEAD~1 --head=HEAD | grep -q 'web-portal'; then
            echo "affected=true" >> $GITHUB_OUTPUT
          else
            echo "affected=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and Test
        if: steps.check_affected.outputs.affected == 'true'
        run: |
          npx nx run web-portal:test
          npx nx run web-portal:build --verbose

      # - name: Trigger Vercel Deployment
      #   if: steps.check_affected.outputs.affected == 'true'
      #   run: curl -X POST "${{ secrets.VERCEL_DEPLOY_PROD_HOOK }}"
      - name: Deploy Prod to Vercel
        if: steps.check_affected.outputs.affected == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_DEPLOY_PROD_HOOK }}
          vercel build --prod --token=${{ secrets.VERCEL_DEPLOY_PROD_HOOK }}
          vercel deploy --prebuilt --prod  --token=${{ secrets.VERCEL_DEPLOY_PROD_HOOK }}