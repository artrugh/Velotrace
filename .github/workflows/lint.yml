name: Lint and Format Check
on:
  push:
    paths:
      - "apps/**"
      - ".github/workflows/lint.yml"
      - "package.json"
      - ".golangci.yml"
      - ".prettierignore"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install dependencies
        run: |
          npm install
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5

      - name: Lint Global Configs (Prettier)
        run: npx prettier --check "*.{json,yml,yaml,md}" ".github/workflows/*.yml"

      - name: Nx Affected Lint
        run: |
          # Use nx affected to run lint target on all changed projects
          npx -y nx affected --target=lint --base=HEAD~1 --head=HEAD
