services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/identity-api/migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  identity:
    build:
      context: ./apps/identity-api
      dockerfile: Dockerfile.dev
      args:
        PORT: ${IDENTITY_API_PORT}
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/identity?sslmode=disable
      PORT: ${IDENTITY_API_PORT}
      GOCACHE: /root/.cache/go-build
      ALLOWED_ORIGINS: http://localhost:${WEB_PORTAL_PORT},http://127.0.0.1:${WEB_PORTAL_PORT}
    ports:
      - "${IDENTITY_API_PORT}:${IDENTITY_API_PORT}"
    volumes:
      - ./apps/identity-api:/app
      - identity_tmp:/app/tmp
      - identity_go_cache:/root/.cache/go-build
      - identity_go_mod:/go/pkg/mod
    extra_hosts:
      - "local.velotrace-identity-api:127.0.0.1"
    command: "air -c .air.toml"
    depends_on:
      db:
        condition: service_healthy

  web-portal:
    build:
      context: ./apps/web-portal
      dockerfile: Dockerfile.dev
      args:
        PORT: ${WEB_PORTAL_PORT}
    user: node
    ports:
      - "${WEB_PORTAL_PORT}:${WEB_PORTAL_PORT}"
    volumes:
      - ./apps/web-portal:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      NODE_ENV: development
      NITRO_OUTPUT_DIR: .vercel/output
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      IDENTITY_API_URL: ${IDENTITY_API_URL}
    extra_hosts:
      - "local.velotrace-webportal:127.0.0.1"

volumes:
  postgres_data:
  identity_go_cache:
  identity_go_mod:
  identity_tmp:
