name: Deploy Web Portal Development
on:
  push:
    branches: [dev]
    paths:
      - "apps/web-portal/**"
      - ".github/workflows/deploy-web-portal-dev.yml"
      - ".github/workflows/web-portal-deploy-template.yml"
      - "libs/api-contract/**"
      - "package.json"
      - "vercel.json"
  workflow_dispatch:

jobs:
  call-deploy:
    uses: ./.github/workflows/web-portal-deploy-template.yml
    with:
      vercel-env: Development
      is-prod: false
    secrets: inherit # Automatically passes all repo secrets