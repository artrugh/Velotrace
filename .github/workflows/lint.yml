name: Lint and Format Check
on:
  push:
    paths:
      - "apps/**"
      - ".github/workflows/lint.yml"
      - "package.json"
      - ".golangci.yml"
      - ".prettierignore"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Global Lint (Prettier)
        run: npm run lint

      - name: Check Affected Projects
        id: affected
        run: |
          AFFECTED=$(npx nx show projects --affected --base=HEAD~1 --head=HEAD)
          if echo "$AFFECTED" | grep -q 'identity-api'; then
            echo "identity_api=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go and Install Linter
        if: steps.affected.outputs.identity_api == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: apps/identity-api/go.sum

      - name: Install golangci-lint and Swag
        if: steps.affected.outputs.identity_api == 'true'
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5
          go install github.com/swaggo/swag/cmd/swag@v1.16.4

      - name: Verify API Contract
        if: steps.affected.outputs.identity_api == 'true'
        run: |
          cd apps/identity-api
          # Matches local .air.toml path logic exactly
          $(go env GOPATH)/bin/swag init -g ./cmd/main.go -d . --output ../../libs/api-contract/identity-api --outputTypes yaml

          cd ../..
          if ! git diff --exit-code libs/api-contract/identity-api/swagger.yaml; then
            echo "❌ ERROR: The API contract (swagger.yaml) is out of date!"
            echo "Please run 'swag init' locally and commit the changes."
            exit 1
          fi

      - name: Nx Affected Lint
        run: npx nx affected --target=lint --base=HEAD~1 --head=HEAD
